- name: latest
  installerSpec:
    kubernetes:
      version: latest
    containerd:
      version: latest
    flannel:
      version: latest
    contour:
      version: latest
    rook:
      version: latest
    registry:
      version: latest
    prometheus:
      version: latest
    ekco:
      version: latest
    kotsadm:
      version: latest
  unsupportedOSIDs:
  - amazon-2023 # kubernetes latest (1.35) isnt supported on Amazon Linux 2023.
  - amzn-20 # kubernetes latest (1.35) does not support cgroup v1
  - centos-74 # kubernetes latest (1.35) does not support cgroup v1
  - centos-78 # kubernetes latest (1.35) does not support cgroup v1
  - centos-79 # kubernetes latest (1.35) does not support cgroup v1
  - ol-79 # kubernetes latest (1.35) does not support cgroup v1
  - ubuntu-1804 # kubernetes latest (1.35) does not support cgroup v1
- name: openebs
  installerSpec:
    contour:
      version: latest
    containerd:
      version: latest
    ekco:
      version: latest
    kubernetes:
      version: latest
    prometheus:
      version: latest
    registry:
      version: latest
    openebs:
      version: latest
      isLocalPVEnabled: true
      localPVStorageClassName: default
    flannel:
      version: latest
    minio:
      version: latest
    kotsadm:
      version: latest
  unsupportedOSIDs:
  - amazon-2023 # kubernetes latest (1.35) isnt supported on Amazon Linux 2023.
  - amzn-20 # kubernetes latest (1.35) does not support cgroup v1
  - centos-74 # kubernetes latest (1.35) does not support cgroup v1
  - centos-78 # kubernetes latest (1.35) does not support cgroup v1
  - centos-79 # kubernetes latest (1.35) does not support cgroup v1
  - ol-79 # kubernetes latest (1.35) does not support cgroup v1
  - ubuntu-1804 # kubernetes latest (1.35) does not support cgroup v1
