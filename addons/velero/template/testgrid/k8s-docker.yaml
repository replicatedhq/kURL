- name: "Velero Minimal"
  cpu: 6
  installerSpec:
    kubernetes:
      version: "1.33.x"
    flannel:
      version: latest
    containerd:
      version: "2.2.x"
    minio:
      version: "2025-10-15T17-29-55Z"
    kotsadm:
      version: latest
    openebs:
      version: "4.4.x"
      isLocalPVEnabled: true
      localPVStorageClassName: "local"
    velero:
      version: "__testver__"
      s3Override: "__testdist__"
  preInstallScript: |
    source /opt/kurl-testgrid/testhelpers.sh
    ubuntu_2404_install_host_packages nfs-common
  postInstallScript: |
    source /opt/kurl-testgrid/testhelpers.sh
    install_and_customize_kurl_integration_test_application
    timeout 5m kubectl kots backup
    timeout 5m kubectl kots backup ls

    # Check if the support bundle spec was installed
    echo "test whether the velero support bundle spec was installed"
    supportBundle=$(kubectl get cm -n velero kurl-velero-supportbundle-spec -ojsonpath='{.data.support-bundle-spec}')
    echo "$supportBundle"
    echo "test if the support bundle has 'troubleshoot.io/kind: support-bundle' label"
    kubectl get cm -n velero kurl-velero-supportbundle-spec -oyaml | grep 'troubleshoot.io/kind: support-bundle'
  unsupportedOSIDs:
    - centos-79 # Rook 1.13+ is not supported on centos-7
    - ol-79 # Rook 1.13+ is not supported on centos-7
    - ol-8x
    - amzn-20
    - ubuntu-1804

- name: "Velero Minimal Airgap"
  cpu: 6
  airgap: true
  installerSpec:
    kubernetes:
      version: "1.31.x"
    flannel:
      version: latest
    rook:
      version: 1.12.x
    containerd:
      version: "latest"
    kotsadm:
      version: latest
    registry:
      version: latest
    velero:
      version: "__testver__"
      s3Override: "__testdist__"
  preInstallScript: |
    source /opt/kurl-testgrid/testhelpers.sh
    rhel_9_install_host_packages lvm2 conntrack-tools socat container-selinux git
    ubuntu_2404_install_host_packages nfs-common containerd socat ebtables conntrack lvm2
  postInstallScript: |
    source /opt/kurl-testgrid/testhelpers.sh
    install_and_customize_kurl_integration_test_application
    timeout 5m kubectl kots backup
    timeout 5m kubectl kots backup ls
- name: "Velero OpenEBS only"
  installerSpec:
    kubernetes:
      version: "1.32.x"
    flannel:
      version: latest
    openebs:
      version: latest
      isLocalPVEnabled: true
      localPVStorageClassName: default
    containerd:
      version: "latest"
    velero:
      version: "__testver__"
      s3Override: "__testdist__"
    minio:
      version: "latest"
  unsupportedOSIDs:
    - centos-79
    - ol-79
    - ol-8x
    - amzn-20
    - ubuntu-1804

- name: "Velero remove restic"
  cpu: 8
  installerSpec:
    kubernetes:
      version: "1.31.x"
    flannel:
      version: latest
    rook:
      version: 1.12.x
    containerd:
      version: "latest"
    kotsadm:
      version: latest
    velero:
      version: "1.9.x"
  upgradeSpec:
    kubernetes:
      version: "1.31.x"
    flannel:
      version: latest
    rook:
      version: 1.12.x
    containerd:
      version: "latest"
    kotsadm:
      version: latest
    velero:
      version: "__testver__"
      s3Override: "__testdist__"
  preInstallScript: |
    source /opt/kurl-testgrid/testhelpers.sh
    ubuntu_2404_install_host_packages nfs-common lvm2
  postInstallScript: |
    source /opt/kurl-testgrid/testhelpers.sh
    install_and_customize_kurl_integration_test_application
    timeout 5m kubectl kots backup
    timeout 5m kubectl kots backup ls
  postUpgradeScript: |
    source /opt/kurl-testgrid/testhelpers.sh
    kubectl get pods -n velero
    timeout 5m kubectl kots backup
    timeout 5m kubectl kots backup ls
    # if restic pods are still running, fail the test
    if kubectl get pods -n velero | grep restic; then
      echo "Restic pods still running after upgrade"
      exit 1
    fi
