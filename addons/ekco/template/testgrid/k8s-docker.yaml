- name: Minimal Latest, Rook
  installerSpec:
    kubernetes:
      version: "1.33.x"
    flannel:
      version: latest
    rook:
      version: "1.19.x"
    containerd:
      version: "latest"
    ekco:
      version: "__testver__"
      s3Override: "__testdist__"
  unsupportedOSIDs:
    - centos-74 # Rook 1.8+ not supported on 3.10.0-693.el7.x86_64 kernel
    - centos-79
    - ol-79
    - ubuntu-1804

- name: Kubernetes 1.34, Rook, Multi node
  installerSpec:
    kubernetes:
      version: 1.34.x
    flannel:
      version: latest
    rook:
      version: "1.19.x"
    containerd:
      version: "latest"
    kotsadm:
      version: latest
      disableS3: true
    ekco:
      version: "__testver__"
      s3Override: "__testdist__"
      minReadyMasterNodeCount: 1
  numPrimaryNodes: 3
  unsupportedOSIDs:
    - centos-74 # Rook 1.8+ not supported on 3.10.0-693.el7.x86_64 kernel
    - centos-79
    - ol-79
    - ubuntu-1804

- name: Kubernetes 1.21, Longhorn, Internal LB
  installerSpec:
    kubernetes:
      version: "1.21.x"
    flannel:
      version: latest
    longhorn:
      version: "latest"
    containerd:
      version: "1.7.x"
    ekco:
      version: "__testver__"
      s3Override: "__testdist__"
      enableInternalLoadBalancer: true
  unsupportedOSIDs:
    - ubuntu-2404
    - amazon-2023
    - ol-8x # package conflicts with longhorn

- name: podImageOverrides
  installerSpec:
    kubernetes:
      version: "1.25.x"
    containerd:
      version: "latest"
    flannel:
      version: latest
    openebs:
      version: "latest"
      isLocalPVEnabled: true
      localPVStorageClassName: default
    contour:
      version: "1.20.0"
    ekco:
      version: "__testver__"
      s3Override: "__testdist__"
      podImageOverrides:
        - ghcr.io/projectcontour/contour:v1.20.0=ghcr.io/projectcontour/contour:v1.20.1
  postInstallScript: |
    sleep 120

    pod_image="$(kubectl -n projectcontour get po -l app=contour -o jsonpath='{.items[].spec.containers[].image}')"
    if ! echo "$pod_image" | grep 'v1.20.1' ; then
      echo "Pod image override failed: $pod_image"
      exit 1
    fi

    echo "Pod image override success: $pod_image"
- name: HAProxy Config File Permission Set to 640
  installerSpec:
    kubernetes:
      version: "1.25.x"
    containerd:
      version: "1.6.x"
    flannel:
      version: latest
    openebs:
      version: "latest"
      isLocalPVEnabled: true
      localPVStorageClassName: default
    ekco:
      version: "__testver__"
      s3Override: "__testdist__"
      enableInternalLoadBalancer: true
  preInstallScript: |
    umask 0027
  
- name: Upgrade HA add ekco
  installerSpec:
    kubernetes:
      version: "1.33.x"
      loadBalancerUseFirstPrimary: true
    flannel:
      version: latest
    containerd:
      version: "1.7.x"
    openebs:
      version: "latest"
      isLocalPVEnabled: true
      localPVStorageClassName: default
    ekco:
      version: "0.10.1"
  upgradeSpec:
    kubernetes:
      version: "1.34.x"
    flannel:
      version: latest
    containerd:
      version: "latest"
    openebs:
      version: "latest"
      isLocalPVEnabled: true
      localPVStorageClassName: default
    ekco:
      version: "__testver__"
      s3Override: "__testdist__"
      enableInternalLoadBalancer: true
  flags: "ha"
  unsupportedOSIDs:
  - centos-74
  - centos-79
  - ol-79
  - ubuntu-1804

