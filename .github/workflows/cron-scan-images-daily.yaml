name: cron-scan-images-daily

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch: {}

jobs:
  build-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/setup-node@v6
      - uses: actions/checkout@v6
      - name: Install dependencies
        working-directory: ./bin/scan-images/
        run: npm install
      - id: set-matrix
        name: Build image matrix
        run: |
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          ./bin/scan-images/matrix.js >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  scan-images:
    name: ${{ matrix.addon }}:${{ matrix.version }} - ${{ matrix.name }}
    needs: build-matrix
    runs-on: ubuntu-24.04
    strategy:
      matrix: ${{ fromJSON(needs.build-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 5
    steps:
      - name: Checkout for Grype config
        uses: actions/checkout@v6
        with:
          sparse-checkout: .grype.yaml
          sparse-checkout-cone-mode: false

      - name: "Scan image"
        id: scan
        uses: anchore/scan-action@v7
        continue-on-error: ${{ ! matrix.maintainer }}
        with:
          image: ${{ matrix.image }}
          fail-build: "true"
          severity-cutoff: high
          only-fixed: "true"
          output-format: json
          output-file: grype.json
          config: .grype.yaml

      - name: "Upload artifact"
        uses: actions/upload-artifact@v6
        if: ${{ always() && steps.scan.outcome == 'failure' }}
        with:
          name: ${{ matrix.addon }}-${{ matrix.version }}-${{ matrix.name }}
          path: grype.json

      - name: "Display results"
        if: ${{ always() && steps.scan.outcome == 'failure' }}
        uses: anchore/scan-action@v7
        continue-on-error: ${{ ! matrix.maintainer }}
        with:
          image: ${{ matrix.image }}
          fail-build: "true"
          severity-cutoff: high
          only-fixed: "true"
          output-format: table
          config: .grype.yaml

  collect-results:
    needs: scan-images
    runs-on: ubuntu-24.04
    if: ${{ failure() }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: scan-results/
      - name: Collect results
        run: |
          jq -s '.' scan-results/*/grype.json > grype.json
      - name: "Upload artifact"
        uses: actions/upload-artifact@v6
        with:
          name: grype results
          path: grype.json
