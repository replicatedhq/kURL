name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # A Personal Access Token (PAT) is required so that workflows (like
          # deploy-prod.yaml) are triggered when release-please creates tags.
          # The default GITHUB_TOKEN cannot trigger subsequent workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
